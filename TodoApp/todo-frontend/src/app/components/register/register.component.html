<div class="register-container">
  <h2>Реєстрація</h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

    <div>
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" placeholder="Введіть email">
    </div>

    <div>
      <label for="password">Пароль</label>
      <input type="password" id="password" formControlName="password" placeholder="Мінімум 6 символів">
    </div>

    <button type="submit" [disabled]="registerForm.invalid">Зареєструватися</button>

  </form>

  <p>Вже маєте акаунт? <a routerLink="/login">Увійти</a></p>
</div>
