<div class="login-container">
  <h2>Вхід у систему</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <div>
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" placeholder="Введіть ваш email">
    </div>

    <div>
      <label for="password">Пароль</label>
      <input type="password" id="password" formControlName="password" placeholder="Мінімум 6 символів">
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Увійти</button>

  </form>

  <p>Ще не маєте акаунта? <a routerLink="/register">Зареєструватися</a></p>
</div>
